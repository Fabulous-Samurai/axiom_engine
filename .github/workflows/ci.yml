name: AXIOM Engine CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build-type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: '3.25.x'

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ python3 python3-dev

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install python@3.11

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-python

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DENABLE_EIGEN=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build-type }}

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --build-config ${{ matrix.build-type }}

    - name: Run Giga Test Suite
      working-directory: build
      run: |
        ./giga_test_suite

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build-type }}
        path: build/Testing/

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem \
          --xml --xml-version=2 \
          src/ include/ 2> cppcheck-report.xml

    - name: Upload cppcheck results
      uses: actions/upload-artifact@v3
      with:
        name: cppcheck-report
        path: cppcheck-report.xml

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ lcov python3 python3-dev

    - name: Configure with coverage flags
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
          -DENABLE_EIGEN=ON

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: |
        cd build
        ./giga_test_suite

    - name: Generate coverage report
      run: |
        lcov --capture --directory build --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.info
        flags: unittests
        name: axiom-engine-coverage

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ python3 python3-dev

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_EIGEN=ON

    - name: Build
      run: cmake --build build

    - name: Run benchmarks
      working-directory: build
      run: |
        ./benchmark_suite > benchmark-results.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: build/benchmark-results.txt

  release:
    name: Create Release Artifacts
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build Release
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_EIGEN=ON
        cmake --build build

    - name: Package Release (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd build
        tar -czf axiom-engine-${{ matrix.os }}.tar.gz \
          giga_test_suite benchmark_suite edge_case_suite \
          ../include ../docs ../README.md ../LICENSE

    - name: Package Release (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd build
        7z a axiom-engine-windows.zip giga_test_suite.exe benchmark_suite.exe edge_case_suite.exe ../include ../docs ../README.md ../LICENSE

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./build/axiom-engine-${{ matrix.os }}.*
        asset_name: axiom-engine-${{ matrix.os }}
        asset_content_type: application/gzip
