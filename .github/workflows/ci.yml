name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Run tests
        run: |
          if [ -f build/CTestTestfile.cmake ]; then
            ctest --test-dir build --output-on-failure
          else
            echo "No CTest integration found; skipping ctest"
          fi

      - name: Upload benchmark artifacts (if present)
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: output/benchmarks/**

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install choco packages
        shell: pwsh
        run: |
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System' ninja

      - name: Configure (Ninja)
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release

      - name: Run tests
        shell: pwsh
        run: |
          if (Test-Path build/CTestTestfile.cmake) {
            ctest -C Release --test-dir build --output-on-failure
          } else {
            Write-Host 'No CTest integration found; skipping ctest'
          }

      - name: Upload benchmark artifacts (if present)
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-windows
          path: output/benchmarks/**
name: AXIOM Engine CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]


concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: |
          requirements*.txt
          pytest.ini

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-optional.txt ]; then pip install -r requirements-optional.txt; fi
        pip install pytest numpy scipy matplotlib

    - name: Run Python test suite
      env:
        PYTHONPATH: .
        MPLBACKEND: Agg
      run: |
        python -m pytest -o addopts="-ra --junitxml=python-test-results.xml"

    - name: Upload Python test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: python-test-results
        path: python-test-results.xml
        if-no-files-found: ignore

  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build-type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: '3.25.x'

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ python3 python3-dev libnuma-dev

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install python@3.11

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-python

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DENABLE_EIGEN=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build-type }}

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --build-config ${{ matrix.build-type }}

    - name: Run Giga Test Suite (Unix)
      if: matrix.os != 'windows-latest'
      working-directory: build
      run: |
        if [ -f ./giga_test_suite ]; then
          ./giga_test_suite
        else
          echo "giga_test_suite binary not found, skipping."
        fi

    - name: Run Giga Test Suite (Windows)
      if: matrix.os == 'windows-latest'
      working-directory: build
      shell: pwsh
      run: |
        if (Test-Path .\giga_test_suite.exe) {
          .\giga_test_suite.exe
        } else {
          Write-Host "giga_test_suite.exe not found, skipping."
        }

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build-type }}
        path: build/Testing/
        if-no-files-found: ignore

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem \
          --xml --xml-version=2 \
          src/ include/ 2> cppcheck-report.xml

    - name: Upload cppcheck results
      uses: actions/upload-artifact@v4
      with:
        name: cppcheck-report
        path: cppcheck-report.xml

  formal-verification:
    name: Formal Verification (TLA+)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect formal verification changes
      id: formal_changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          formal:
            - 'formal/tla/**'
            - 'docs/formal/**'
            - '.github/workflows/ci.yml'

    - name: Skip note (no formal changes)
      if: steps.formal_changes.outputs.formal != 'true'
      run: echo "No formal/TLA+ changes detected. Skipping TLC run."

    - name: Setup Java
      if: steps.formal_changes.outputs.formal == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Download TLC tools
      if: steps.formal_changes.outputs.formal == 'true'
      run: |
        curl -fsSL -o tla2tools.jar https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
        java -jar tla2tools.jar -help > /dev/null

    - name: Run TLA+ model checks
      if: steps.formal_changes.outputs.formal == 'true'
      run: |
        mkdir -p formal/tla/logs
        for cfg in formal/tla/*.cfg; do
          spec="${cfg%.cfg}.tla"
          name="$(basename "${cfg%.cfg}")"
          echo "Running TLC for ${name}"
          java -jar tla2tools.jar -config "$cfg" "$spec" | tee "formal/tla/logs/${name}.log"
        done

    - name: Upload TLC output
      if: always() && steps.formal_changes.outputs.formal == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: tlc-output
        path: formal/tla/logs/*.log
        if-no-files-found: ignore

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 25

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ lcov python3 python3-dev libnuma-dev

    - name: Configure with coverage flags
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
          -DENABLE_EIGEN=ON

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: |
        cd build
        ./giga_test_suite

    - name: Generate coverage report
      run: |
        lcov --capture --directory build --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.info
        flags: unittests
        name: axiom-engine-coverage

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ python3 python3-dev libnuma-dev

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_EIGEN=ON

    - name: Build
      run: cmake --build build

    - name: Run benchmarks
      working-directory: build
      run: |
        ./axiom_benchmark > benchmark-results.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: build/benchmark-results.txt
        if-no-files-found: error

  release:
    name: Create Release Artifacts
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Release
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_EIGEN=ON
        cmake --build build

    - name: Package Release (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd build
        tar -czf axiom-engine-${{ matrix.os }}.tar.gz \
          axiom run_tests giga_test_suite axiom_benchmark \
          ../include ../docs ../README.md ../LICENSE

    - name: Package Release (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd build
        7z a axiom-engine-windows.zip axiom.exe run_tests.exe giga_test_suite.exe axiom_benchmark.exe ../include ../docs ../README.md ../LICENSE

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: matrix.os != 'windows-latest'
      with:
        files: build/axiom-engine-${{ matrix.os }}.tar.gz

    - name: Upload Release Asset (Windows)
      uses: softprops/action-gh-release@v2
      if: matrix.os == 'windows-latest'
      with:
        files: build/axiom-engine-windows.zip
